      Cache control: force the browser to re-fetch index.html on every visit.
      Critical because every Vite build emits new chunk hashes
      (PerceptionMonitor-BH1wGx69.js → PerceptionMonitor-DjTsudeJ.js etc).
      A stale index.html references chunks that no longer exist → 404 →
      "Failed to fetch dynamically imported module" error in the SPA.
      GitHub Pages doesn't honour _headers files (that's Netlify/Cloudflare),
      so we set this client-side via meta http-equiv. The hashed assets in
      /assets/ are still cacheable by the browser's default rules — only
      this index.html is never cached.
    -->

    <meta http-equiv="Pragma" content="no-cache" />

    <!-- ─── SPA page-view tracker (Matomo) ────────────────────────────────
         The app is a hash-router SPA, so without this every route change
         (M1 → M2, /settings, /reportv3, etc.) would be invisible to
         analytics — only the initial load would register. On every
         hashchange we tell Matomo: "the URL just changed, re-count it as
         a page view."
    -->
    <script>
      (function () {
        if (typeof window === "undefined") return;
        function trackSpaView() {
          if (!window._paq) return;
          window._paq.push(['setCustomUrl', window.location.href]);
          window._paq.push(['setDocumentTitle', document.title]);
          window._paq.push(['trackPageView']);
        }
        window.addEventListener('hashchange', trackSpaView);
